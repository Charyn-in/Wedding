<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>婚宴席位查询</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: #f9f0ec;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px 28px 20px 20px;
            box-shadow: 0 12px 40px rgba(180, 60, 50, 0.15);
            overflow: hidden;
            position: relative;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(200, 70, 60, 0.08) 0%, transparent 30%),
                radial-gradient(circle at 80% 70%, rgba(200, 70, 60, 0.10) 0%, transparent 40%),
                radial-gradient(circle at 40% 80%, rgba(200, 70, 60, 0.06) 0%, transparent 25%),
                linear-gradient(135deg, #fdf8f6 0%, #fef0ea 100%);
            background-blend-mode: normal;
        }
        .top-image {
            width: 100%;
            height: 0;
            padding-bottom: 40%;
            position: relative;
            background-color: #e8d5ce;
            background-image: url('https://raw.githubusercontent.com/Charyn-in/Wedding/main/images/%E5%B0%81%E9%9D%A2%E5%9B%BE(2).jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            overflow: hidden;
            border-bottom: 2px solid #f0d9d0;
        }
        .main-content {
            padding: 22px 24px 28px;
            background: transparent;
        }
        .wedding-title {
            text-align: center;
            font-size: 22px;
            font-weight: 600;
            color: #6b3a2e;
            letter-spacing: 3px;
            margin-bottom: 24px;
            line-height: 1.4;
        }
        .search-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-row {
            display: flex;
            align-items: center;
            background: #fdf7f4;
            border-radius: 40px;
            padding: 4px 4px 4px 18px;
            border: 1px solid #f0d9d0;
            box-shadow: inset 0 2px 4px rgba(180, 80, 60, 0.04);
        }
        .input-row label {
            font-size: 16px;
            color: #6b3a2e;
            font-weight: 500;
            white-space: nowrap;
            letter-spacing: 1px;
            margin-right: 8px;
        }
        .input-row input {
            flex: 1;
            border: none;
            outline: none;
            background: transparent;
            padding: 14px 10px;
            font-size: 16px;
            color: #3d2a22;
            min-width: 0;
        }
        .input-row input::placeholder {
            color: #c4a89e;
            font-weight: 300;
            font-size: 15px;
        }
        .btn-query {
            width: 100%;
            padding: 16px 0;
            background: linear-gradient(135deg, #b85a4a, #a34738);
            border: none;
            border-radius: 40px;
            color: #fff;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 4px;
            box-shadow: 0 6px 16px rgba(180, 70, 50, 0.30);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
        }
        .btn-query:active {
            transform: scale(0.97);
            box-shadow: 0 3px 8px rgba(180, 70, 50, 0.25);
        }
        .btn-query:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
        .footer-welcome {
            text-align: center;
            margin-top: 28px;
            font-size: 15px;
            color: #9f7a6e;
            letter-spacing: 3px;
            font-weight: 400;
            border-top: 1px solid #f0dad2;
            padding-top: 20px;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(50, 30, 25, 0.55);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
            padding: 24px;
            animation: fadeIn 0.25s ease;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: #ffffff;
            border-radius: 32px;
            padding: 40px 30px 32px;
            max-width: 340px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(80, 30, 20, 0.3);
            text-align: center;
            position: relative;
            animation: slideUp 0.3s ease;
        }
        .modal-box .close-btn {
            position: absolute;
            top: 14px;
            right: 20px;
            font-size: 26px;
            color: #b9a098;
            cursor: pointer;
            line-height: 1;
            background: none;
            border: none;
            padding: 4px;
        }
        .modal-box .close-btn:active {
            color: #6b3a2e;
        }
        .modal-box .result-label {
            font-size: 18px;
            color: #6b3a2e;
            font-weight: 500;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .modal-box .result-name {
            font-size: 22px;
            color: #3d2a22;
            font-weight: 600;
            margin: 6px 0 12px;
        }
        .modal-box .result-table {
            font-size: 48px;
            font-weight: 700;
            color: #b85a4a;
            letter-spacing: 2px;
            margin: 8px 0 16px;
            background: #fdf4f0;
            padding: 10px 20px;
            border-radius: 60px;
            display: inline-block;
        }
        .modal-box .result-hint {
            font-size: 14px;
            color: #a4877c;
            margin-top: 12px;
        }
        .modal-box .not-found {
            font-size: 18px;
            color: #9f7a6e;
            padding: 16px 0;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                transform: translateY(30px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #3d2a22;
            color: #f5e3dc;
            padding: 12px 24px;
            border-radius: 40px;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }
        @media (max-width: 420px) {
            .main-content {
                padding: 18px 16px 22px;
            }
            .wedding-title {
                font-size: 20px;
            }
            .input-row {
                padding-left: 14px;
            }
            .input-row input {
                font-size: 15px;
                padding: 12px 8px;
            }
            .btn-query {
                font-size: 18px;
                padding: 14px 0;
            }
            .modal-box {
                padding: 32px 20px 28px;
            }
            .modal-box .result-table {
                font-size: 40px;
            }
        }
    </style>
</head>
<body>

    <div class="container" id="app">
        <div class="top-image" id="topImage"></div>

        <div class="main-content">
            <div class="wedding-title">许晓婷&常砾婚礼席位查询</div>

            <div class="search-form">
                <div class="input-row">
                    <label for="guestName">您的姓名</label>
                    <input type="text" id="guestName" placeholder="请输入您的全名" autocomplete="off" />
                </div>
                <button class="btn-query" id="queryBtn">点击查询</button>
            </div>

            <div class="footer-welcome">欢迎赴约，共证美好</div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="resultModal">
        <div class="modal-box">
            <button class="close-btn" id="modalClose">✕</button>
            <div id="modalContent"></div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============================================================
            // 配置 Supabase（请替换成你的真实值）
            // ============================================================
            const SUPABASE_URL = 'https://你的项目ID.supabase.co';     // ← 替换
            const SUPABASE_ANON_KEY = 'sb_publishable_xxxxx';          // ← 替换

            console.log('🔧 Supabase 配置检查:');
            console.log('  URL:', SUPABASE_URL);
            console.log('  KEY 长度:', SUPABASE_ANON_KEY ? SUPABASE_ANON_KEY.length : '空');

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // ---------- DOM 元素 ----------
            const guestNameInput = document.getElementById('guestName');
            const queryBtn = document.getElementById('queryBtn');
            const modalOverlay = document.getElementById('resultModal');
            const modalContent = document.getElementById('modalContent');
            const modalClose = document.getElementById('modalClose');
            const toast = document.getElementById('toast');

            // ---------- 查询逻辑（带详细调试日志） ----------
            async function queryGuest() {
                const input = guestNameInput.value.trim();
                console.log('🔍 [1] 获取输入:', input);

                if (!input) {
                    showToast('请输入您的姓名');
                    return;
                }

                queryBtn.textContent = '查询中...';
                queryBtn.disabled = true;

                console.log('🔍 [2] 准备查询 Supabase...');

                try {
                    console.log('🔍 [3] 执行 supabase.from("guest").select()...');
                    const { data, error } = await supabase
                        .from('guest')
                        .select('name, table_number')
                        .eq('name', input);

                    console.log('🔍 [4] 收到响应');
                    console.log('  📦 data:', data);
                    console.log('  ⚠️ error:', error);

                    if (error) {
                        console.error('❌ 查询错误:', error);
                        showToast('❌ 查询失败: ' + error.message);
                        return;
                    }

                    if (data && data.length > 0) {
                        const guest = data[0];
                        console.log('✅ 找到宾客:', guest);
                        showResult(guest.name, guest.table_number);
                    } else {
                        console.log('❌ 未找到宾客:', input);
                        showNotFound(input);
                    }
                } catch (err) {
                    console.error('💥 异常:', err);
                    showToast('❌ 查询异常: ' + err.message);
                } finally {
                    queryBtn.textContent = '点击查询';
                    queryBtn.disabled = false;
                }
            }

            // ============================================================
            // 显示结果（文案已按用户要求修改）
            // ============================================================
            function showResult(name, table) {
                modalContent.innerHTML = `
                            <div class="result-label">您的晚宴桌位号是</div>
                            <div class="result-name">${escapeHtml(name)}</div>
                            <div class="result-table">第${escapeHtml(table)}桌</div>
                            <div class="result-hint">感谢赴约，共享喜宴</div>
                        `;
                modalOverlay.classList.add('active');
            }

            function showNotFound(name) {
                modalContent.innerHTML = `
                            <div class="not-found">😅 未找到 “${escapeHtml(name)}” 的座位信息</div>
                            <div style="margin-top:16px; font-size:14px; color:#b9a098;">请确认姓名是否正确，或联系工作人员</div>
                        `;
                modalOverlay.classList.add('active');
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function closeModal() {
                modalOverlay.classList.remove('active');
            }

            // Toast
            let toastTimer = null;

            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = setTimeout(function() {
                    toast.classList.remove('show');
                }, 4000);
            }

            // ---------- 事件绑定 ----------
            modalClose.addEventListener('click', closeModal);
            modalOverlay.addEventListener('click', function(e) {
                if (e.target === modalOverlay) closeModal();
            });

            queryBtn.addEventListener('click', function() {
                console.log('🖱️ 查询按钮被点击');
                queryGuest();
            });

            guestNameInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    console.log('⌨️ 回车键触发了查询');
                    queryGuest();
                }
            });

            console.log('✅ 婚宴查询已启动（Supabase 云端数据，带调试日志）');
        })();
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>管理员后台 · 婚宴席位查询</title>
    <!-- 引入 SheetJS 用于解析 Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js">
    </script>
    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
            background-color: #f5edea;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .admin-container {
            max-width: 560px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 12px 40px rgba(180, 60, 50, 0.12);
            padding: 28px 24px 32px;
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0e0da;
        }

        .admin-header h1 {
            font-size: 20px;
            font-weight: 600;
            color: #6b3a2e;
            letter-spacing: 1px;
        }

        .admin-header .badge {
            font-size: 12px;
            background: #f0e0da;
            color: #8a5a4e;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: 1px;
        }

        .admin-section {
            background: #fdf9f7;
            border-radius: 16px;
            padding: 18px 18px 20px;
            margin-bottom: 18px;
            border: 1px solid #f0e4df;
        }

        .admin-section .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #6b3a2e;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-section .section-title .count {
            font-weight: 400;
            font-size: 13px;
            color: #b0887c;
            background: #f0e4df;
            padding: 0 12px;
            border-radius: 12px;
        }

        /* 文件上传区域 */
        .upload-area {
            border: 2px dashed #dcc8c0;
            border-radius: 12px;
            padding: 24px 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.3s, background 0.3s;
            background: #fdf9f7;
        }

        .upload-area:hover {
            border-color: #b85a4a;
            background: #fcf3ef;
        }

        .upload-area .icon {
            font-size: 36px;
            display: block;
            margin-bottom: 8px;
        }

        .upload-area .text {
            color: #8a5a4e;
            font-size: 14px;
        }

        .upload-area .sub {
            color: #b9a098;
            font-size: 12px;
            margin-top: 4px;
        }

        #fileInput {
            display: none;
        }

        .file-actions {
            display: flex;
            gap: 10px;
            margin-top: 14px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: linear-gradient(135deg, #b85a4a, #a34738);
            color: #fff;
            box-shadow: 0 4px 12px rgba(180, 70, 50, 0.25);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-secondary {
            background: #f0e4df;
            color: #6b3a2e;
        }

        .btn-secondary:hover {
            background: #e8d8d0;
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #dcc8c0;
            color: #8a5a4e;
        }

        .btn-outline:hover {
            background: #f5edea;
        }

        .btn-success {
            background: #5a8a6e;
            color: #fff;
            box-shadow: 0 4px 12px rgba(80, 130, 100, 0.25);
        }

        .btn-danger {
            background: #b85a4a;
            color: #fff;
        }

        /* 预览表格 */
        .preview-box {
            margin-top: 14px;
            max-height: 200px;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #f0e4df;
            display: none;
        }

        .preview-box.show {
            display: block;
        }

        .preview-box table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .preview-box th {
            text-align: left;
            padding: 6px 14px;
            color: #8a5a4e;
            font-weight: 500;
            border-bottom: 1px solid #f0e4df;
            position: sticky;
            top: 0;
            background: #fff;
        }

        .preview-box td {
            padding: 5px 14px;
            color: #3d2a22;
            border-bottom: 1px solid #f5edea;
        }

        .preview-box .empty-msg {
            padding: 18px;
            text-align: center;
            color: #c4b0a8;
            font-size: 13px;
        }

        /* 状态信息 */
        .status-msg {
            margin-top: 12px;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            display: none;
            background: #f5edea;
            color: #6b3a2e;
        }

        .status-msg.show {
            display: block;
        }

        .status-msg.success {
            background: #e6f0ea;
            color: #2d6a4f;
        }

        .status-msg.error {
            background: #f5e6e3;
            color: #a34738;
        }

        /* 数据列表 */
        .data-list {
            margin-top: 12px;
            max-height: 200px;
            overflow-y: auto;
            background: #ffffff;
            border-radius: 10px;
            border: 1px solid #f0e4df;
        }

        .data-list table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .data-list th {
            text-align: left;
            padding: 6px 14px;
            color: #8a5a4e;
            font-weight: 500;
            border-bottom: 1px solid #f0e4df;
            position: sticky;
            top: 0;
            background: #fff;
        }

        .data-list td {
            padding: 5px 14px;
            color: #3d2a22;
            border-bottom: 1px solid #f5edea;
        }

        .data-list .empty-msg {
            padding: 18px;
            text-align: center;
            color: #c4b0a8;
            font-size: 13px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #3d2a22;
            color: #f5e3dc;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.4s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 420px) {
            .admin-container {
                padding: 20px 16px 24px;
            }
            .btn {
                font-size: 13px;
                padding: 8px 16px;
            }
        }
    </style>
</head>
<body>

    <div class="admin-container">
        <!-- 头部 -->
        <div class="admin-header">
            <h1>🔐 管理后台</h1>
            <span class="badge">数据导入</span>
        </div>

        <!-- 数据导入 -->
        <div class="admin-section">
            <div class="section-title">
                📋 导入宾客名单
                <span class="count" id="totalCount">0 人</span>
            </div>

            <!-- 上传区域 -->
            <div class="upload-area" id="uploadArea">
                <span class="icon">📁</span>
                <div class="text">点击选择 Excel / CSV 文件</div>
                <div class="sub">支持 .xlsx, .xls, .csv</div>
            </div>
            <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" />

            <!-- 预览表格 -->
            <div class="preview-box" id="previewBox">
                <table>
                    <thead><tr><th>姓名</th><th>桌号</th></tr></thead>
                    <tbody id="previewBody"></tbody>
                </table>
            </div>

            <!-- 操作按钮 -->
            <div class="file-actions">
                <button class="btn btn-primary" id="importBtn" disabled>⬆️ 导入到数据库</button>
                <button class="btn btn-outline" id="clearBtn">🗑️ 清空预览</button>
            </div>

            <!-- 状态信息 -->
            <div class="status-msg" id="statusMsg"></div>
        </div>

        <!-- 当前数据列表 -->
        <div class="admin-section">
            <div class="section-title">
                📊 当前数据
                <span class="count" id="currentCount">0 人</span>
            </div>
            <div class="data-list" id="dataList">
                <div class="empty-msg">暂无数据，请导入</div>
            </div>
            <div style="margin-top:10px;">
                <button class="btn btn-danger" id="clearAllBtn" style="flex:none; width:100%;">🗑️ 清空所有数据</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        (function() {
            // ============================================================
            // 配置 Supabase
            // ============================================================
            const SUPABASE_URL = 'https://rzmkfaumkfjnqsvvublf.supabase.co';     // ← 替换
            const SUPABASE_ANON_KEY = 'sb_publishable_2jqTvVMIqD3Drmjl5AUeKQ_QohbbHzA';          // ← 替换

            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

            // ============================================================
            // DOM 引用
            // ============================================================
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            const previewBox = document.getElementById('previewBox');
            const previewBody = document.getElementById('previewBody');
            const importBtn = document.getElementById('importBtn');
            const clearBtn = document.getElementById('clearBtn');
            const clearAllBtn = document.getElementById('clearAllBtn');
            const statusMsg = document.getElementById('statusMsg');
            const totalCount = document.getElementById('totalCount');
            const currentCount = document.getElementById('currentCount');
            const dataList = document.getElementById('dataList');
            const toast = document.getElementById('toast');

            let parsedData = []; // 当前预览的数据 [{name, table_number}]

            // ============================================================
            // 工具函数
            // ============================================================
            function showToast(msg) {
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => toast.classList.remove('show'), 3000);
            }

            function showStatus(msg, type = '') {
                statusMsg.textContent = msg;
                statusMsg.className = 'status-msg show ' + type;
            }

            function hideStatus() {
                statusMsg.className = 'status-msg';
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            // ============================================================
            // 加载当前数据（从 Supabase）
            // ============================================================
            async function loadCurrentData() {
                try {
                    const { data, error } = await supabase
                        .from('guest')
                        .select('name, table_number')
                        .order('id', { ascending: true });

                    if (error) {
                        console.error('加载数据失败:', error);
                        return;
                    }

                    currentCount.textContent = (data && data.length) || 0 + ' 人';
                    totalCount.textContent = (data && data.length) || 0 + ' 人';

                    if (!data || data.length === 0) {
                        dataList.innerHTML = '<div class="empty-msg">暂无数据，请导入</div>';
                        return;
                    }

                    let html = `<table>
                                <thead><tr><th>姓名</th><th>桌号</th></tr></thead>
                                <tbody>`;
                    data.forEach(item => {
                        html += `<tr><td>${escapeHtml(item.name)}</td><td>第${escapeHtml(item.table_number)}桌</td></tr>`;
                    });
                    html += `</tbody></table>`;
                    dataList.innerHTML = html;
                } catch (err) {
                    console.error('加载异常:', err);
                }
            }

            // ============================================================
            // 文件上传 & 解析
            // ============================================================
            uploadArea.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;

                // 重置
                parsedData = [];
                previewBody.innerHTML = '';
                previewBox.classList.remove('show');
                importBtn.disabled = true;
                hideStatus();

                const reader = new FileReader();
                reader.onload = function(ev) {
                    try {
                        let workbook;
                        const data = ev.target.result;
                        if (file.name.endsWith('.csv')) {
                            // CSV 用 SheetJS 解析
                            workbook = XLSX.read(data, { type: 'array' });
                        } else {
                            workbook = XLSX.read(data, { type: 'array' });
                        }
                        const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                        const json = XLSX.utils.sheet_to_json(firstSheet, { header: 1 });

                        // 自动识别列
                        let nameCol = 0,
                            tableCol = 1;
                        let startRow = 0;
                        if (json.length > 0) {
                            const header = json[0];
                            for (let i = 0; i < header.length; i++) {
                                const cell = String(header[i] || '').trim();
                                if (cell.includes('姓名') || cell.includes('名字') || cell.includes('宾客')) {
                                    nameCol = i;
                                }
                                if (cell.includes('桌') || cell.includes('座位') || cell.includes('号')) {
                                    tableCol = i;
                                }
                            }
                            if (header.some(h => h && (String(h).includes('姓名') || String(h).includes('桌')))) {
                                startRow = 1;
                            }
                        }

                        const newData = [];
                        for (let r = startRow; r < json.length; r++) {
                            const row = json[r];
                            if (!row || row.length === 0) continue;
                            const name = String(row[nameCol] || '').trim();
                            const table = String(row[tableCol] || '').trim();
                            if (name && table) {
                                newData.push({ name, table_number: table });
                            }
                        }

                        if (newData.length === 0) {
                            showStatus('⚠️ 未解析到有效数据，请检查列名（姓名、桌号）', 'error');
                            return;
                        }

                        parsedData = newData;
                        // 渲染预览
                        let html = '';
                        const show = parsedData.slice(0, 20);
                        show.forEach(item => {
                            html +=
                                `<tr><td>${escapeHtml(item.name)}</td><td>第${escapeHtml(item.table_number)}桌</td></tr>`;
                        });
                        if (parsedData.length > 20) {
                            html +=
                                `<tr><td colspan="2" style="text-align:center;color:#b0887c;font-size:12px;">... 共 ${parsedData.length} 位宾客</td></tr>`;
                        }
                        previewBody.innerHTML = html;
                        previewBox.classList.add('show');
                        importBtn.disabled = false;
                        showStatus(`✅ 解析成功，共 ${parsedData.length} 位宾客，点击“导入到数据库”`, 'success');
                    } catch (err) {
                        console.error('解析失败:', err);
                        showStatus('❌ 文件解析失败，请确认格式正确', 'error');
                    }
                };
                reader.readAsArrayBuffer(file);
                // 重置 input
                fileInput.value = '';
            });

            // ============================================================
            // 导入到 Supabase
            // ============================================================
            importBtn.addEventListener('click', async function() {
                if (parsedData.length === 0) {
                    showStatus('⚠️ 没有可导入的数据', 'error');
                    return;
                }

                // 确认
                if (!confirm(`确定要导入 ${parsedData.length} 位宾客吗？`)) return;

                importBtn.disabled = true;
                importBtn.textContent = '导入中...';
                showStatus('⏳ 正在导入...', '');

                let successCount = 0;
                let failCount = 0;

                try {
                    // 批量插入（逐条或批量，这里使用批量 upsert 可能更高效，但 Supabase 的 insert 支持数组）
                    const { data, error } = await supabase
                        .from('guest')
                        .insert(parsedData.map(item => ({
                            name: item.name,
                            table_number: item.table_number
                        })));

                    if (error) {
                        console.error('导入错误:', error);
                        showStatus(`❌ 导入失败: ${error.message}`, 'error');
                        importBtn.disabled = false;
                        importBtn.textContent = '⬆️ 导入到数据库';
                        return;
                    }

                    // 成功
                    successCount = parsedData.length;
                    showStatus(`✅ 成功导入 ${successCount} 位宾客`, 'success');
                    // 清空预览
                    parsedData = [];
                    previewBody.innerHTML = '';
                    previewBox.classList.remove('show');
                    importBtn.disabled = true;
                    // 刷新数据列表
                    await loadCurrentData();
                } catch (err) {
                    console.error('导入异常:', err);
                    showStatus(`❌ 导入异常: ${err.message}`, 'error');
                } finally {
                    importBtn.disabled = false;
                    importBtn.textContent = '⬆️ 导入到数据库';
                }
            });

            // ============================================================
            // 清空预览
            // ============================================================
            clearBtn.addEventListener('click', function() {
                parsedData = [];
                previewBody.innerHTML = '';
                previewBox.classList.remove('show');
                importBtn.disabled = true;
                hideStatus();
            });

            // ============================================================
            // 清空所有数据（危险操作）
            // ============================================================
           clearAllBtn.addEventListener('click', async function() {
    if (!confirm('⚠️ 确定要清空所有宾客数据吗？此操作不可恢复！')) return;
    if (!confirm('再次确认：清空所有数据？')) return;

    // 禁用按钮，防止重复点击
    clearAllBtn.disabled = true;
    clearAllBtn.textContent = '清空中...';

    try {
        const { error } = await supabase
            .from('guest')
            .delete()
            .neq('id', 0);

        if (error) {
            console.error('删除错误:', error);
            showStatus(`❌ 清空失败: ${error.message}`, 'error');
            clearAllBtn.disabled = false;
            clearAllBtn.textContent = '🗑️ 清空所有数据';
            return;
        }

        showStatus('✅ 所有数据已清空', 'success');
        // 强制刷新数据列表
        await loadCurrentData();
        // 同时刷新预览区的数据计数
        totalCount.textContent = '0 人';
        currentCount.textContent = '0 人';
        // 清空数据列表显示
        dataList.innerHTML = '<div class="empty-msg">暂无数据，请导入</div>';
    } catch (err) {
        console.error('清空异常:', err);
        showStatus(`❌ 清空异常: ${err.message}`, 'error');
    } finally {
        clearAllBtn.disabled = false;
        clearAllBtn.textContent = '🗑️ 清空所有数据';
    }
});

            // ============================================================
            // 初始化
            // ============================================================
            loadCurrentData();
            console.log('🔐 管理后台已启动 (Supabase)');
        })();
    </script>
</body>
</html>
